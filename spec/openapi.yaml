openapi: 3.1.0
info:
  title: I3X - Industrial Information Interface eXchange API
  description: |
    A common API for Contextualized Manufacturing Information Platforms (CMIPs) as defined in RFC 001.

    This specification enables portable application development across different manufacturing
    information platforms by providing a vendor-agnostic API specification.

    ## Key Concepts

    - **ElementId**: Platform-specific unique string identifier for any element
    - **Namespace**: Logical grouping of related types and instances
    - **ObjectType**: Schema definition for a class of objects
    - **ObjectInstance**: Actual equipment, sensors, or processes with attribute values
    - **VQT**: Value-Quality-Timestamp format for all data values
    - **Relationships**: Organizational (HasParent/HasChildren) and Composition (HasComponent/ComponentOf)

    ## maxDepth Parameter

    Controls recursion through HasComponent relationships:
    - `maxDepth=0`: Infinite recursion (include all nested composed elements)
    - `maxDepth=1`: No recursion (just this element's value) - default
    - `maxDepth=N`: Recurse up to N levels deep

    ## Quality Values

    - `Good`: Value is valid and current
    - `GoodNoData`: No data available but connection is good
    - `Bad`: Value is invalid or connection failed
    - `Uncertain`: Value quality cannot be determined

  version: 1.0.0
  contact:
    name: CESMII - The Smart Manufacturing Institute
    url: https://www.cesmii.org
  license:
    name: Copyright CESMII 2024
    url: https://www.cesmii.org

servers:
  - url: https://i3x.cesmii.net
    description: Public demo server
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Exploratory
    description: RFC 4.1 - Read-only operations for browsing the address space
  - name: Values
    description: RFC 4.2.1/4.2.2 - Query and update operations for object values
  - name: Subscriptions
    description: RFC 4.2.3 - Real-time data streaming and polling

paths:
  # ============================================================================
  # RFC 4.1.1 - Namespaces
  # ============================================================================
  /namespaces:
    get:
      operationId: getNamespaces
      summary: List all namespaces
      description: |
        Returns an array of Namespaces registered in the CMIP.
        All Namespaces MUST have a Namespace URI to support follow-up queries.

        **RFC Reference:** 4.1.1
      tags:
        - Exploratory
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Namespace'
              example:
                - uri: "https://www.abelara.com/ns/equipment"
                  displayName: "Abelara Equipment"
                - uri: "https://www.isa.org/isa95"
                  displayName: "ISA-95"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  # ============================================================================
  # RFC 4.1.2/4.1.3 - Object Types
  # ============================================================================
  /objecttypes:
    get:
      operationId: getObjectTypes
      summary: List all object types
      description: |
        Returns an array of Type definitions registered in the CMIP.
        All Types MUST have an ElementId to support follow-up queries.
        The response MAY be filtered by NamespaceURI.

        **RFC Reference:** 4.1.3
      tags:
        - Exploratory
      parameters:
        - name: namespaceUri
          in: query
          description: Filter types by namespace URI
          required: false
          schema:
            type: string
            format: uri
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ObjectType'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /objecttypes/{elementId}:
    get:
      operationId: getObjectTypeById
      summary: Get object type by ID
      description: |
        Returns a JSON structure defining a Type registered in the CMIP
        for the requested Type's ElementId.

        **RFC Reference:** 4.1.2
      tags:
        - Exploratory
      parameters:
        - $ref: '#/components/parameters/ElementIdPath'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectType'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ============================================================================
  # RFC 4.1.4 - Relationship Types
  # ============================================================================
  /relationshiptypes:
    get:
      operationId: getRelationshipTypes
      summary: List all relationship types
      description: |
        Returns an array of relationship type definitions registered in the CMIP.

        At minimum, implementations MUST support organizational hierarchy relationship types:
        - **HasParent/HasChildren**: Topological/organizational hierarchy

        Implementations MAY support composition relationship types:
        - **HasComponent/ComponentOf**: Data composition relationships

        **RFC Reference:** 4.1.4
      tags:
        - Exploratory
      parameters:
        - name: namespaceUri
          in: query
          description: Filter relationship types by namespace URI
          required: false
          schema:
            type: string
            format: uri
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RelationshipType'
              example:
                - elementId: "HasParent"
                  displayName: "Has Parent"
                  namespaceUri: "https://www.i3x.org/relationships"
                  reverseOf: "HasChildren"
                - elementId: "HasChildren"
                  displayName: "Has Children"
                  namespaceUri: "https://www.i3x.org/relationships"
                  reverseOf: "HasParent"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /relationshiptypes/{elementId}:
    get:
      operationId: getRelationshipTypeById
      summary: Get relationship type by ID
      description: |
        Returns a specific relationship type definition by its ElementId.

        **RFC Reference:** 4.1.4
      tags:
        - Exploratory
      parameters:
        - $ref: '#/components/parameters/ElementIdPath'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelationshipType'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ============================================================================
  # RFC 4.1.5/4.1.7 - Object Instances
  # ============================================================================
  /objects:
    get:
      operationId: getObjects
      summary: List object instances
      description: |
        Returns an array of instance objects. Optionally filter by TypeId.

        The returned payload MUST include the metadata indicated in RFC 3.1.1:
        - displayName
        - parentId
        - hasChildren/isComposition
        - namespaceUri

        **RFC Reference:** 4.1.5
      tags:
        - Exploratory
      parameters:
        - name: typeId
          in: query
          description: Filter instances by object type ElementId
          required: false
          schema:
            type: string
        - name: includeMetadata
          in: query
          description: Include optional metadata (RFC 3.1.2)
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ObjectInstance'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /objects/{elementId}:
    get:
      operationId: getObjectById
      summary: Get object instance by ID
      description: |
        Returns the instance object for the requested ElementId, conforming to the
        Type definition from which the instance is derived.

        The returned payload MUST include the most recent values of metadata
        indicated in RFC 3.1.1.

        **RFC Reference:** 4.1.7
      tags:
        - Exploratory
      parameters:
        - $ref: '#/components/parameters/ElementIdPath'
        - name: includeMetadata
          in: query
          description: Include optional metadata (RFC 3.1.2)
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectInstance'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ============================================================================
  # RFC 4.1.6 - Related Objects
  # ============================================================================
  /objects/{elementId}/related:
    get:
      operationId: getRelatedObjects
      summary: Get related objects
      description: |
        Returns an array of objects related to the requested ElementId
        by the specified relationship type.

        If no relationship type is specified, returns all related objects.

        **RFC Reference:** 4.1.6
      tags:
        - Exploratory
      parameters:
        - $ref: '#/components/parameters/ElementIdPath'
        - name: relationshiptype
          in: query
          description: Filter by relationship type name (e.g., HasChildren, HasComponent)
          required: false
          schema:
            type: string
        - name: includeMetadata
          in: query
          description: Include optional metadata (RFC 3.1.2)
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RelatedObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ============================================================================
  # RFC 4.2.1.1 - Current Value Query
  # ============================================================================
  /objects/{elementId}/value:
    get:
      operationId: getCurrentValue
      summary: Get current value
      description: |
        Returns the current (last known) value for the requested object.

        When the requested element has `isComposition: true`, the maxDepth parameter
        controls recursion through HasComponent relationships.

        The response MUST include the VQT (Value-Quality-Timestamp) structure.

        **RFC Reference:** 4.2.1.1
      tags:
        - Values
      parameters:
        - $ref: '#/components/parameters/ElementIdPath'
        - $ref: '#/components/parameters/MaxDepth'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LastKnownValue'
              examples:
                simple:
                  summary: Simple value
                  value:
                    elementId: "sensor-001"
                    isComposition: false
                    value:
                      value: 72.5
                      quality: "Good"
                      timestamp: "2025-01-08T10:30:00Z"
                composition:
                  summary: Composition value (maxDepth > 1)
                  value:
                    elementId: "machine-001"
                    isComposition: true
                    value:
                      _value:
                        value: { status: "running" }
                        quality: "Good"
                        timestamp: "2025-01-08T10:30:00Z"
                      sensor-temp:
                        value: 72.5
                        quality: "Good"
                        timestamp: "2025-01-08T10:30:00Z"
                      sensor-pressure:
                        value: 101.3
                        quality: "Good"
                        timestamp: "2025-01-08T10:30:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    put:
      operationId: updateCurrentValue
      summary: Update current value
      description: |
        Updates the current value for the requested object.

        If the CMIP supports write-back to a Control System, additional security
        requirements outside the scope of this specification MUST be considered.

        **RFC Reference:** 4.2.2.1
      tags:
        - Values
      parameters:
        - $ref: '#/components/parameters/ElementIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValueUpdate'
            example:
              value: 75.0
      responses:
        '200':
          description: Value updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '501':
          $ref: '#/components/responses/NotImplemented'
        '500':
          $ref: '#/components/responses/InternalError'

  # ============================================================================
  # RFC 4.2.1.2 - Historical Value Query
  # ============================================================================
  /objects/{elementId}/history:
    get:
      operationId: getHistoricalValues
      summary: Get historical values
      description: |
        Returns an array of historical values in the specified time range
        for the requested object.

        When the requested element has `isComposition: true`, the maxDepth parameter
        controls recursion through HasComponent relationships.

        Each element in the response array MUST include the VQT structure.

        **RFC Reference:** 4.2.1.2
      tags:
        - Values
      parameters:
        - $ref: '#/components/parameters/ElementIdPath'
        - name: startTime
          in: query
          description: Start of time range (RFC 3339 format)
          required: false
          schema:
            type: string
            format: date-time
        - name: endTime
          in: query
          description: End of time range (RFC 3339 format)
          required: false
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/MaxDepth'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistoricalValue'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    put:
      operationId: updateHistoricalValues
      summary: Update historical values
      description: |
        Updates or creates historical values for the requested object.

        When updating historical data, the CMIP SHOULD implement auditing
        or tracking of such changes.

        **RFC Reference:** 4.2.2.2
      tags:
        - Values
      parameters:
        - $ref: '#/components/parameters/ElementIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/HistoricalValueUpdate'
      responses:
        '200':
          description: Historical values updated successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistoricalUpdateResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '501':
          $ref: '#/components/responses/NotImplemented'
        '500':
          $ref: '#/components/responses/InternalError'

  # ============================================================================
  # RFC 4.2.3 - Subscriptions
  # ============================================================================
  /subscriptions:
    get:
      operationId: listSubscriptions
      summary: List all subscriptions
      description: |
        Returns a list of all active subscriptions for the authenticated client.

        Note: This endpoint is informational and not explicitly defined in RFC 001.
      tags:
        - Subscriptions
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      operationId: createSubscription
      summary: Create a subscription
      description: |
        Registers a client for a new subscription. This initial handshake allows
        the CMIP to allocate resources for a client.

        The response MUST include a Subscription ID that may be used for follow-up calls.

        Monitoring begins when objects are registered via the /register endpoint.

        **RFC Reference:** 4.2.3.1
      tags:
        - Subscriptions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubscriptionRequest'
      responses:
        '200':
          description: Subscription created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSubscriptionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /subscriptions/{subscriptionId}:
    get:
      operationId: getSubscription
      summary: Get subscription details
      description: |
        Returns details about a specific subscription including monitored items
        and current status.
      tags:
        - Subscriptions
      parameters:
        - $ref: '#/components/parameters/SubscriptionIdPath'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      operationId: deleteSubscription
      summary: Delete a subscription
      description: |
        Cancels publication of future messages for the specified subscription,
        allowing the CMIP to release resources and state held for the client.

        **RFC Reference:** 4.2.3.5
      tags:
        - Subscriptions
      parameters:
        - $ref: '#/components/parameters/SubscriptionIdPath'
      responses:
        '200':
          description: Subscription deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnsubscribeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /subscriptions/{subscriptionId}/register:
    post:
      operationId: registerMonitoredItems
      summary: Register monitored items
      description: |
        Registers the ElementIds the client wishes to subscribe to.

        Upon registration, the CMIP MUST begin publishing changed values.
        This method is additive - the client can add additional monitored items later.

        The maxDepth parameter controls recursion through HasComponent relationships
        when publishing updates for composition elements.

        **RFC Reference:** 4.2.3.2
      tags:
        - Subscriptions
      parameters:
        - $ref: '#/components/parameters/SubscriptionIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterItemsRequest'
      responses:
        '200':
          description: Items registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterItemsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Subscription or element not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'

  /subscriptions/{subscriptionId}/unregister:
    post:
      operationId: unregisterMonitoredItems
      summary: Remove monitored items
      description: |
        Removes the ElementIds the client no longer wishes to monitor
        from the specified subscription.

        **RFC Reference:** 4.2.3.3
      tags:
        - Subscriptions
      parameters:
        - $ref: '#/components/parameters/SubscriptionIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterItemsRequest'
      responses:
        '200':
          description: Items unregistered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnregisterItemsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /subscriptions/{subscriptionId}/stream:
    get:
      operationId: streamSubscription
      summary: Open SSE stream (QoS0)
      description: |
        Opens a Server-Sent Events (SSE) stream for real-time data delivery.

        This implements QoS 0 (At Most Once) delivery - the CMIP will publish
        messages as data becomes available, but provides no guarantee of delivery.

        When the stream is active, updates are delivered immediately rather than
        being queued for /sync retrieval.

        **RFC Reference:** 4.2.3.2 (QoS 0)
      tags:
        - Subscriptions
      parameters:
        - $ref: '#/components/parameters/SubscriptionIdPath'
        - name: qos
          in: query
          description: QoS level (0 for SSE streaming)
          required: false
          schema:
            type: integer
            enum: [0]
            default: 0
      responses:
        '200':
          description: SSE stream opened successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SubscriptionUpdate'
              description: |
                Stream of JSON arrays, each containing subscription updates.
                Each line is a complete JSON array that can be parsed independently.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /subscriptions/{subscriptionId}/sync:
    post:
      operationId: syncSubscription
      summary: Poll for updates (QoS2)
      description: |
        Retrieves queued updates for the subscription and acknowledges receipt.

        This implements QoS 2 (Exactly Once) delivery - the server will persist
        messages for re-delivery until the client acknowledges successful receipt.

        The CMIP MUST respond with an array of updates for elements that have
        changed since the last Sync call. If no elements have changed, the
        response MUST be an empty array.

        **RFC Reference:** 4.2.3.4
      tags:
        - Subscriptions
      parameters:
        - $ref: '#/components/parameters/SubscriptionIdPath'
        - name: qos
          in: query
          description: QoS level (2 for polling)
          required: false
          schema:
            type: integer
            enum: [2]
            default: 2
      responses:
        '200':
          description: Successful response with queued updates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SubscriptionUpdate'
              example:
                - elementId: "sensor-001"
                  value: 72.5
                  quality: "Good"
                  timestamp: "2025-01-08T10:30:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

# ==============================================================================
# Components
# ==============================================================================
components:
  # ============================================================================
  # Schemas
  # ============================================================================
  schemas:
    # --------------------------------------------------------------------------
    # Core Domain Objects
    # --------------------------------------------------------------------------
    Namespace:
      type: object
      description: A logical scope that groups related types, instances, and relationships
      required:
        - uri
        - displayName
      properties:
        uri:
          type: string
          format: uri
          description: Unique namespace URI
          example: "https://www.abelara.com/ns/equipment"
        displayName:
          type: string
          description: Human-readable namespace name
          example: "Abelara Equipment"

    ObjectType:
      type: object
      description: Schema definition for a class of objects (RFC 3.3)
      required:
        - elementId
        - displayName
        - namespaceUri
        - schema
      properties:
        elementId:
          type: string
          description: Unique string identifier for the type
          example: "MachineType"
        displayName:
          type: string
          description: Human-readable type name
          example: "Machine"
        namespaceUri:
          type: string
          format: uri
          description: Namespace URI this type belongs to
          example: "https://www.abelara.com/ns/equipment"
        schema:
          type: object
          description: JSON Schema definition for this object type
          additionalProperties: true

    RelationshipType:
      type: object
      description: Definition of a relationship between objects (RFC 3.2)
      required:
        - elementId
        - displayName
        - namespaceUri
        - reverseOf
      properties:
        elementId:
          type: string
          description: Unique string identifier for the relationship type
          example: "HasParent"
        displayName:
          type: string
          description: Human-readable relationship type name
          example: "Has Parent"
        namespaceUri:
          type: string
          format: uri
          description: Namespace URI for this relationship type
          example: "https://www.i3x.org/relationships"
        reverseOf:
          type: string
          description: ElementId of the inverse relationship type
          example: "HasChildren"

    ObjectInstance:
      type: object
      description: An actual equipment, sensor, or process with attribute values (RFC 3.1)
      required:
        - elementId
        - displayName
        - typeId
        - isComposition
        - namespaceUri
      properties:
        elementId:
          type: string
          description: Unique string identifier for this instance
          example: "machine-001"
        displayName:
          type: string
          description: Human-readable instance name
          example: "CNC Machine #1"
        typeId:
          type: string
          description: ElementId of the object type this instance is derived from
          example: "MachineType"
        parentId:
          type: string
          nullable: true
          description: ElementId of the parent object (if any)
          example: "production-line-a"
        isComposition:
          type: boolean
          description: True if this element has composed child objects (HasComponent)
          example: false
        namespaceUri:
          type: string
          format: uri
          description: Namespace URI for this instance
          example: "https://www.abelara.com/ns/equipment"
        relationships:
          type: object
          description: Relationships to other objects (when includeMetadata=true)
          additionalProperties: true

    RelatedObject:
      type: object
      description: Object returned from a relationship query
      allOf:
        - $ref: '#/components/schemas/ObjectInstance'
        - type: object
          properties:
            subject:
              type: string
              description: ElementId of the subject of the relationship
            relationshipType:
              type: string
              description: Relationship type from source to this instance
            relationshipTypeInverse:
              type: string
              description: Inverse relationship type from this instance to source

    # --------------------------------------------------------------------------
    # Value Objects
    # --------------------------------------------------------------------------
    VQT:
      type: object
      description: Value-Quality-Timestamp structure (RFC 4.2.1.1)
      required:
        - value
        - quality
        - timestamp
      properties:
        value:
          description: The actual data value (any JSON type)
        quality:
          type: string
          description: Data quality indicator
          enum:
            - Good
            - GoodNoData
            - Bad
            - Uncertain
          example: "Good"
        timestamp:
          type: string
          format: date-time
          description: ISO 8601/RFC 3339 timestamp when data was recorded
          example: "2025-01-08T10:30:00Z"

    LastKnownValue:
      type: object
      description: Current value response (RFC 4.2.1.1)
      required:
        - elementId
        - isComposition
        - value
      properties:
        elementId:
          type: string
          description: ElementId of the requested object
        isComposition:
          type: boolean
          description: True if this element has composed child objects
        value:
          description: |
            The value in VQT format. For composition elements with maxDepth > 1,
            this contains nested values keyed by child elementId.
          oneOf:
            - $ref: '#/components/schemas/VQT'
            - type: object
              description: Nested structure for composition elements
              additionalProperties: true

    HistoricalValue:
      type: object
      description: Single historical value entry
      allOf:
        - $ref: '#/components/schemas/VQT'
        - type: object
          properties:
            elementId:
              type: string
              description: ElementId of the object

    # --------------------------------------------------------------------------
    # Update Objects
    # --------------------------------------------------------------------------
    ValueUpdate:
      type: object
      description: Request body for updating a value
      required:
        - value
      properties:
        value:
          description: The new value to set (any JSON type)

    UpdateResult:
      type: object
      description: Result of a value update operation
      required:
        - elementId
        - success
        - message
      properties:
        elementId:
          type: string
          description: ElementId of the updated object
        success:
          type: boolean
          description: Whether the update succeeded
        message:
          type: string
          description: Human-readable result message

    HistoricalValueUpdate:
      type: object
      description: Request body for updating historical values
      required:
        - timestamp
        - value
      properties:
        timestamp:
          type: string
          format: date-time
          description: Timestamp for the historical value
        value:
          description: The historical value to set

    HistoricalUpdateResult:
      type: object
      description: Result of a historical value update operation
      required:
        - elementId
        - timestamp
        - success
        - message
      properties:
        elementId:
          type: string
        timestamp:
          type: string
          format: date-time
        success:
          type: boolean
        message:
          type: string

    # --------------------------------------------------------------------------
    # Subscription Objects
    # --------------------------------------------------------------------------
    CreateSubscriptionRequest:
      type: object
      description: Request body for creating a subscription
      properties: {}
      additionalProperties: true

    CreateSubscriptionResponse:
      type: object
      description: Response from creating a subscription
      required:
        - subscriptionId
        - message
      properties:
        subscriptionId:
          type: string
          description: Unique identifier for the new subscription
          example: "0"
        message:
          type: string
          description: Human-readable confirmation message
          example: "Subscription created successfully."

    SubscriptionList:
      type: object
      description: List of subscriptions
      required:
        - subscriptionIds
      properties:
        subscriptionIds:
          type: array
          items:
            $ref: '#/components/schemas/SubscriptionSummary'

    SubscriptionSummary:
      type: object
      description: Brief subscription information
      required:
        - subscriptionId
        - created
      properties:
        subscriptionId:
          type: string
          description: Unique subscription identifier
        created:
          type: string
          format: date-time
          description: Timestamp when subscription was created

    SubscriptionDetails:
      type: object
      description: Full subscription details
      required:
        - subscriptionId
        - created
        - isStreaming
        - queuedUpdates
        - objects
      properties:
        subscriptionId:
          type: string
        created:
          type: string
          format: date-time
        isStreaming:
          type: boolean
          description: True if SSE stream is currently active
        queuedUpdates:
          type: integer
          description: Number of updates waiting in queue
        objects:
          type: array
          items:
            type: string
          description: List of monitored element IDs

    RegisterItemsRequest:
      type: object
      description: Request body for registering or unregistering monitored items
      required:
        - elementIds
      properties:
        elementIds:
          type: array
          items:
            type: string
          description: Array of ElementIds to monitor
          example: ["sensor-001", "sensor-002"]
        maxDepth:
          type: integer
          minimum: 0
          default: 1
          description: |
            Controls recursion through HasComponent relationships:
            - 0: Infinite recursion
            - 1: No recursion (default)
            - N: Recurse up to N levels

    RegisterItemsResponse:
      type: object
      description: Response from registering monitored items
      required:
        - message
        - totalObjects
      properties:
        message:
          type: string
          example: "Registered 5 objects to subscription."
        totalObjects:
          type: integer
          description: Total number of monitored objects after registration

    UnregisterItemsResponse:
      type: object
      description: Response from unregistering monitored items
      required:
        - message
      properties:
        message:
          type: string
          example: "Unregistered 3 objects from subscription."

    UnsubscribeResponse:
      type: object
      description: Response from deleting a subscription
      required:
        - message
        - unsubscribed
        - not_found
      properties:
        message:
          type: string
          example: "Unsubscribe processed."
        unsubscribed:
          type: array
          items:
            type: string
          description: List of successfully unsubscribed IDs
        not_found:
          type: array
          items:
            type: string
          description: List of IDs that were not found

    SubscriptionUpdate:
      type: object
      description: A single update from a subscription
      required:
        - elementId
        - value
      properties:
        elementId:
          type: string
          description: ElementId of the changed element
        value:
          description: The new value
        quality:
          type: string
          description: Quality indicator
          enum:
            - Good
            - GoodNoData
            - Bad
            - Uncertain
        timestamp:
          type: string
          format: date-time
          description: Timestamp of the change

    # --------------------------------------------------------------------------
    # Error Response
    # --------------------------------------------------------------------------
    Error:
      type: object
      description: Standard error response
      required:
        - detail
      properties:
        detail:
          type: string
          description: Human-readable error message
          example: "Element 'unknown-id' not found"

  # ============================================================================
  # Parameters
  # ============================================================================
  parameters:
    ElementIdPath:
      name: elementId
      in: path
      required: true
      description: Unique string identifier for an element
      schema:
        type: string
      example: "machine-001"

    SubscriptionIdPath:
      name: subscriptionId
      in: path
      required: true
      description: Unique subscription identifier
      schema:
        type: string
      example: "0"

    MaxDepth:
      name: maxDepth
      in: query
      required: false
      description: |
        Controls recursion through HasComponent relationships:
        - 0: Infinite recursion (include all nested composed elements)
        - 1: No recursion (just this element's value) - default
        - N: Recurse up to N levels deep
      schema:
        type: integer
        minimum: 0
        default: 1

  # ============================================================================
  # Responses
  # ============================================================================
  responses:
    BadRequest:
      description: Bad request - invalid parameters or request body
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            detail: "Invalid request body"

    Unauthorized:
      description: Unauthorized - authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            detail: "Authentication required"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            detail: "Element 'unknown-id' not found"

    NotImplemented:
      description: Operation not implemented
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            detail: "Operation not implemented"

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            detail: "Internal server error"

  # ============================================================================
  # Security Schemes
  # ============================================================================
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key authentication (RFC 5.3.1)

    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT/OAuth bearer token authentication (optional)

security:
  - ApiKeyAuth: []
  - BearerAuth: []
